# orchestrator.yaml — generated by lindy-orchestrate onboard

project:
  name: "lindy-orchestrator"
  branch_prefix: "af"

modules:
  - name: lindy-orchestrator
    path: ./
    repo: eddieran/lindy-orchestrator
    ci_workflow: ci.yml

planner:
  mode: cli  # cli | api
  # model: claude-sonnet-4-20250514  # for api mode

dispatcher:
  timeout_seconds: 1800
  permission_mode: bypassPermissions

qa_gates:
  custom:
    - name: lindy-orchestrator-pytest
      command: "pytest"
      cwd: "{module_path}"
    - name: lindy-orchestrator-ruff
      command: "ruff check ."
      cwd: "{module_path}"

safety:
  dry_run: false
  max_retries_per_task: 2
  max_parallel: 1
