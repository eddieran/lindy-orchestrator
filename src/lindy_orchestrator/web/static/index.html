<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lindy Orchestrator Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --gray: #484f58;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .status-dot.connected { background: var(--green); }
  .status-dot.disconnected { background: var(--red); }

  #connection-status {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    grid-template-rows: 1fr 280px;
    gap: 1px;
    height: calc(100vh - 49px);
    background: var(--border);
  }

  .panel {
    background: var(--surface);
    overflow: auto;
  }

  .panel-header {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  /* -- DAG panel -- */
  #dag-panel { grid-row: 1 / 3; }

  .dag-goal {
    padding: 12px 16px;
    font-size: 13px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }

  .dag-container { padding: 16px; }

  .task-node {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    margin: 4px 0;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 13px;
    transition: border-color 0.3s, background 0.3s;
  }

  .task-node.pending   { border-left: 3px solid var(--gray); }
  .task-node.running   { border-left: 3px solid var(--blue); background: rgba(88,166,255,0.06); }
  .task-node.completed { border-left: 3px solid var(--green); }
  .task-node.failed    { border-left: 3px solid var(--red); background: rgba(248,81,73,0.06); }
  .task-node.skipped   { border-left: 3px solid var(--yellow); opacity: 0.6; }

  .task-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-right: 10px;
    font-size: 11px;
    flex-shrink: 0;
  }

  .pending   .task-icon { background: var(--gray); color: #fff; }
  .running   .task-icon { background: var(--blue); color: #fff; animation: pulse 1.5s infinite; }
  .completed .task-icon { background: var(--green); color: #fff; }
  .failed    .task-icon { background: var(--red); color: #fff; }
  .skipped   .task-icon { background: var(--yellow); color: #fff; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .task-id {
    font-weight: 600;
    margin-right: 8px;
    color: var(--text-dim);
    font-size: 11px;
    min-width: 18px;
  }

  .task-module {
    background: rgba(88,166,255,0.1);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .task-desc {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .task-cost {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 8px;
    flex-shrink: 0;
  }

  .dep-line {
    margin-left: 26px;
    border-left: 2px solid var(--border);
    height: 8px;
  }

  /* -- Cost sidebar -- */
  #cost-panel { grid-column: 2; }

  .cost-total {
    padding: 16px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .cost-total .amount {
    font-size: 28px;
    font-weight: 700;
    color: var(--green);
  }

  .cost-total .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .cost-breakdown { padding: 12px 16px; }

  .cost-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
  }

  .cost-row .key { color: var(--text-dim); }
  .cost-row .val { font-weight: 500; }

  .meter {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin: 12px 0 4px;
    overflow: hidden;
  }

  .meter-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s;
  }

  .meter-fill.green  { background: var(--green); }
  .meter-fill.red    { background: var(--red); }
  .meter-fill.blue   { background: var(--blue); }
  .meter-fill.yellow { background: var(--yellow); }

  /* -- QA log -- */
  #qa-panel { grid-column: 2; }

  .qa-list { padding: 8px 16px; }

  .qa-entry {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .qa-entry:last-child { border-bottom: none; }

  .qa-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    margin-right: 6px;
  }

  .qa-badge.pass { background: rgba(63,185,80,0.15); color: var(--green); }
  .qa-badge.fail { background: rgba(248,81,73,0.15); color: var(--red); }

  .qa-gate { color: var(--text-dim); margin-right: 4px; }
  .qa-task { color: var(--accent); font-weight: 500; }
  .qa-output {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .empty-state {
    padding: 24px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  @media (max-width: 768px) {
    .layout {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
    }
    #dag-panel { grid-row: auto; }
  }
</style>
</head>
<body>

<header>
  <h1><span>Lindy</span> Orchestrator</h1>
  <div id="connection-status">
    <span class="status-dot disconnected" id="status-dot"></span>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<div class="layout">
  <div class="panel" id="dag-panel">
    <div class="panel-header">Task DAG</div>
    <div class="dag-goal" id="dag-goal">Loading...</div>
    <div class="dag-container" id="dag-container"></div>
  </div>

  <div class="panel" id="cost-panel">
    <div class="panel-header">Cost</div>
    <div class="cost-total">
      <div class="amount" id="total-cost">$0.0000</div>
      <div class="label">Total Cost (USD)</div>
    </div>
    <div class="cost-breakdown" id="cost-breakdown"></div>
  </div>

  <div class="panel" id="qa-panel">
    <div class="panel-header">QA Results</div>
    <div class="qa-list" id="qa-list">
      <div class="empty-state">No QA results yet</div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // -- State --
  let state = { goal: '', tasks: [] };
  let qaResults = [];
  let evtSource = null;
  let metricsTimer = null;

  const STATUS_MAP = {
    pending: 'pending',
    in_progress: 'running',
    completed: 'completed',
    failed: 'failed',
    skipped: 'skipped',
  };

  const ICON_MAP = {
    pending: '\u2022',
    running: '\u25B6',
    completed: '\u2713',
    failed: '\u2717',
    skipped: '\u2014',
  };

  // -- Init --
  fetchState();
  connectSSE();
  startMetricsPolling();

  function fetchState() {
    fetch('/api/state')
      .then(r => r.json())
      .then(data => {
        state = data;
        renderDAG();
        updateCosts();
      })
      .catch(() => {});
  }

  function connectSSE() {
    if (evtSource) evtSource.close();
    evtSource = new EventSource('/api/events');

    evtSource.onopen = function() {
      setConnected(true);
    };

    evtSource.onerror = function() {
      setConnected(false);
      // EventSource auto-reconnects
    };

    evtSource.addEventListener('task_event', function(e) {
      var evt = JSON.parse(e.data);
      handleEvent(evt);
    });

    evtSource.addEventListener('shutdown', function() {
      setConnected(false);
      evtSource.close();
    });
  }

  function startMetricsPolling() {
    metricsTimer = setInterval(function() {
      fetch('/api/metrics')
        .then(r => r.json())
        .then(data => updateMetrics(data))
        .catch(() => {});
    }, 5000);
  }

  // -- Event handling --
  function handleEvent(evt) {
    var taskId = evt.task_id;
    var type = evt.type;
    var data = evt.data || {};

    // Update task status
    if (taskId != null) {
      var task = state.tasks.find(t => t.id === taskId);
      if (task) {
        if (type === 'task_started')   task.status = 'in_progress';
        if (type === 'task_completed') task.status = 'completed';
        if (type === 'task_failed')    task.status = 'failed';
        if (type === 'task_skipped')   task.status = 'skipped';

        if (data.cost_usd != null) task.cost_usd = data.cost_usd;
      }
    }

    // QA events
    if (type === 'qa_passed' || type === 'qa_failed') {
      qaResults.unshift({
        passed: type === 'qa_passed',
        gate: data.gate || 'unknown',
        task_id: taskId,
        output: (data.output || '').substring(0, 200),
        timestamp: evt.timestamp,
      });
      if (qaResults.length > 50) qaResults.length = 50;
      renderQA();
    }

    renderDAG();
    updateCosts();
  }

  // -- Rendering --
  function renderDAG() {
    var goalEl = document.getElementById('dag-goal');
    goalEl.textContent = state.goal || 'No plan loaded';

    var container = document.getElementById('dag-container');
    container.innerHTML = '';

    if (!state.tasks || state.tasks.length === 0) {
      container.innerHTML = '<div class="empty-state">No tasks</div>';
      return;
    }

    // Build levels
    var taskMap = {};
    state.tasks.forEach(t => taskMap[t.id] = t);

    // Topological sort into levels
    var levels = computeLevels(state.tasks, taskMap);

    levels.forEach(function(level) {
      level.forEach(function(task) {
        if (task.depends_on && task.depends_on.length > 0) {
          var depLine = document.createElement('div');
          depLine.className = 'dep-line';
          container.appendChild(depLine);
        }

        var css = STATUS_MAP[task.status] || 'pending';
        var icon = ICON_MAP[css] || '\u2022';

        var node = document.createElement('div');
        node.className = 'task-node ' + css;
        node.innerHTML =
          '<div class="task-icon">' + icon + '</div>' +
          '<span class="task-id">#' + task.id + '</span>' +
          '<span class="task-module">' + esc(task.module) + '</span>' +
          '<span class="task-desc">' + esc(truncate(task.description, 60)) + '</span>' +
          (task.cost_usd ? '<span class="task-cost">$' + task.cost_usd.toFixed(4) + '</span>' : '');

        container.appendChild(node);
      });
    });
  }

  function computeLevels(tasks, taskMap) {
    var memo = {};
    function depth(tid) {
      if (memo[tid] !== undefined) return memo[tid];
      var t = taskMap[tid];
      if (!t) return 0;
      var deps = (t.depends_on || []).filter(d => taskMap[d]);
      memo[tid] = deps.length === 0 ? 0 : Math.max.apply(null, deps.map(depth)) + 1;
      return memo[tid];
    }
    tasks.forEach(t => depth(t.id));

    var maxLevel = 0;
    tasks.forEach(t => { if (memo[t.id] > maxLevel) maxLevel = memo[t.id]; });

    var levels = [];
    for (var i = 0; i <= maxLevel; i++) levels.push([]);
    tasks.forEach(t => levels[memo[t.id]].push(t));
    return levels;
  }

  function updateCosts() {
    var total = 0;
    var perModule = {};

    (state.tasks || []).forEach(function(t) {
      var cost = t.cost_usd || 0;
      total += cost;
      if (t.module) {
        perModule[t.module] = (perModule[t.module] || 0) + cost;
      }
    });

    document.getElementById('total-cost').textContent = '$' + total.toFixed(4);

    // Task progress
    var counts = { completed: 0, failed: 0, running: 0, pending: 0, skipped: 0 };
    (state.tasks || []).forEach(function(t) {
      var s = STATUS_MAP[t.status] || 'pending';
      counts[s] = (counts[s] || 0) + 1;
    });
    var totalTasks = state.tasks ? state.tasks.length : 0;

    var breakdown = document.getElementById('cost-breakdown');
    var html = '';

    // Progress meter
    if (totalTasks > 0) {
      var pctDone = ((counts.completed + counts.failed + counts.skipped) / totalTasks * 100);
      var pctGreen = (counts.completed / totalTasks * 100);
      var pctRed = (counts.failed / totalTasks * 100);
      var pctBlue = (counts.running / totalTasks * 100);
      var pctYellow = (counts.skipped / totalTasks * 100);

      html += '<div class="meter">';
      html += '<div style="display:flex;height:100%">';
      html += '<div class="meter-fill green" style="width:' + pctGreen + '%"></div>';
      html += '<div class="meter-fill blue" style="width:' + pctBlue + '%"></div>';
      html += '<div class="meter-fill red" style="width:' + pctRed + '%"></div>';
      html += '<div class="meter-fill yellow" style="width:' + pctYellow + '%"></div>';
      html += '</div></div>';
    }

    html += '<div class="cost-row"><span class="key">Completed</span><span class="val" style="color:var(--green)">' + counts.completed + '</span></div>';
    html += '<div class="cost-row"><span class="key">Running</span><span class="val" style="color:var(--blue)">' + counts.running + '</span></div>';
    html += '<div class="cost-row"><span class="key">Failed</span><span class="val" style="color:var(--red)">' + counts.failed + '</span></div>';
    html += '<div class="cost-row"><span class="key">Pending</span><span class="val">' + counts.pending + '</span></div>';
    if (counts.skipped > 0) {
      html += '<div class="cost-row"><span class="key">Skipped</span><span class="val" style="color:var(--yellow)">' + counts.skipped + '</span></div>';
    }

    // Per-module cost
    var modules = Object.keys(perModule).sort();
    if (modules.length > 0) {
      html += '<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:8px">';
      html += '<div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Per Module</div>';
      modules.forEach(function(m) {
        html += '<div class="cost-row"><span class="key">' + esc(m) + '</span><span class="val">$' + perModule[m].toFixed(4) + '</span></div>';
      });
      html += '</div>';
    }

    breakdown.innerHTML = html;
  }

  function updateMetrics(data) {
    if (data.total_cost_usd != null) {
      document.getElementById('total-cost').textContent = '$' + data.total_cost_usd.toFixed(4);
    }
  }

  function renderQA() {
    var list = document.getElementById('qa-list');
    if (qaResults.length === 0) {
      list.innerHTML = '<div class="empty-state">No QA results yet</div>';
      return;
    }

    var html = '';
    qaResults.forEach(function(r) {
      var badge = r.passed ? '<span class="qa-badge pass">PASS</span>' : '<span class="qa-badge fail">FAIL</span>';
      html += '<div class="qa-entry">';
      html += badge;
      html += '<span class="qa-task">Task #' + r.task_id + '</span> ';
      html += '<span class="qa-gate">' + esc(r.gate) + '</span>';
      if (r.output) {
        html += '<div class="qa-output">' + esc(r.output) + '</div>';
      }
      html += '</div>';
    });
    list.innerHTML = html;
  }

  function setConnected(connected) {
    var dot = document.getElementById('status-dot');
    var text = document.getElementById('status-text');
    if (connected) {
      dot.className = 'status-dot connected';
      text.textContent = 'Connected';
    } else {
      dot.className = 'status-dot disconnected';
      text.textContent = 'Reconnecting...';
    }
  }

  // -- Helpers --
  function esc(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s || ''));
    return d.innerHTML;
  }

  function truncate(s, max) {
    if (!s) return '';
    return s.length > max ? s.substring(0, max - 1) + '\u2026' : s;
  }
})();
</script>
</body>
</html>
